<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RiskLens | Community Safety</title>
    <link rel="stylesheet" href="new_style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="main-container">
        <div class="left-panel">
            <div class="overlay-text">
                <div class="logo-box">RL</div>
                <h2>RiskLens</h2>
                <p>Real-time crime tracking & community analytics.</p>
            </div>
        </div>

        <div class="right-panel">
            <div class="form-content">
                <h1>Create Account</h1>
                <p class="subtitle">Join the network to report and stay alert. <a href="login.html">Log in</a></p>

                <form action="signup.php" method="POST">
                    <div class="input-group">
                        <label>Full Name</label>
                        <input type="text" name="name" placeholder="John Doe" required>
                    </div>

                    <div class="input-row">
                        <div class="input-group">
                            <label>Email Address</label>
                            <input type="email" name="email" placeholder="john@example.com" required>
                        </div>
                        <div class="input-group">
                            <label>Phone Number</label>
                            <input type="tel" name="phone" placeholder="017XXXXXXXX" required>
                        </div>
                    </div>

                    <div class="input-row">
                        <div class="input-group">
                            <label>Home Area (Area ID)</label>
                            <input type="number" name="area_id" placeholder="e.g. 12" required>
                        </div>
                        <div class="input-group">
                            <label>Password</label>
                            <input type="password" name="password" placeholder="••••••••" required>
                        </div>
                    </div>

                    <button type="submit" class="primary-btn">Sign Up</button>

                    <div class="divider">or</div>

                    <button type="button" class="social-btn">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="G"> Continue with Google
                    </button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
<script>
    const urlParams = new URLSearchParams(window.location.search);
    
    if (urlParams.has('status')) {
        const status = urlParams.get('status');
        if (status === 'exists') {
            alert("This Email or Phone Number is already registered!");
        } else if (status === 'fail') {
            alert("Registration failed. Please try again.");
        }
    }
</script>
